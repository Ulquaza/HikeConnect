services:
  api:
    build:
      context: .
      dockerfile: HikeConnect.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      JwtSettings__SecretKey: ${JwtSettings__SecretKey}
      Cors__AllowedOrigins__0: ${Cors__AllowedOrigins__0}
      Cors__AllowedOrigins__1: ${Cors__AllowedOrigins__1}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hike_net

  webapp:
    build:
      context: .
      dockerfile: HikeConnect.WebApp/Dockerfile
    ports:
      - "9011:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - hike_net

  db:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - hike_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:

networks:
  hike_net:
    driver: bridge
